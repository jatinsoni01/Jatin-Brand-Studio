<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — Jatin Brand Studio</title>
<link rel="stylesheet" href="css/admin.css">
<style>
.pin-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--black);position:relative;overflow:hidden}
.pin-page::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(255,102,0,0.07),transparent 70%);pointer-events:none}
.pin-card{width:100%;max-width:360px;background:var(--dark2);border:1px solid rgba(255,102,0,0.2);padding:48px 32px;position:relative;z-index:1;clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,0 100%);text-align:center}
.pin-logo{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:4px;margin-bottom:6px}
.pin-logo span{color:#FF6600}
.pin-sub{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:3px;text-transform:uppercase;color:#666;margin-bottom:36px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:32px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.12);background:transparent;transition:all .2s ease}
.pin-dot.filled{background:#FF6600;border-color:#FF6600;box-shadow:0 0 12px rgba(255,102,0,.5)}
.pin-dot.error{background:#ef4444;border-color:#ef4444;animation:shake .4s ease}
.pin-dot.ok{background:#22c55e;border-color:#22c55e}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.kbtn{height:64px;background:#1a1a1a;border:1px solid rgba(255,255,255,.06);color:#fff;font-family:'Bebas Neue',cursive;font-size:1.8rem;cursor:pointer;transition:all .15s ease;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);user-select:none}
.kbtn:hover{background:#222;border-color:rgba(255,102,0,.3);color:#FF6600}
.kbtn:active{transform:scale(.93);background:rgba(255,102,0,.12)}
.kbtn.del{font-size:1.2rem;color:#999}
.kbtn.del:hover{color:#ef4444;border-color:rgba(239,68,68,.3)}
.kbtn.empty{background:transparent;border-color:transparent;cursor:default}
.kbtn.empty:hover{background:transparent;border-color:transparent;color:#fff}
.pin-msg{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;letter-spacing:1.5px;min-height:22px;margin-top:10px;transition:.3s;color:#666}
.pin-msg.err{color:#fca5a5}
.pin-msg.lock{color:#fcd34d}
.pin-msg.ok{color:#86efac}
.tries{display:flex;justify-content:center;gap:10px;margin-top:16px}
.try-dot{width:8px;height:8px;border-radius:50%;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);transition:.3s}
.try-dot.used{background:#ef4444;border-color:#ef4444}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;display:none}
.loading-overlay.show{display:flex}
.loading-spin{width:40px;height:40px;border:3px solid rgba(255,102,0,.3);border-top-color:#FF6600;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spin"></div>
</div>

<div class="pin-page">
  <div class="pin-card">
    <div class="pin-logo"><span>J</span>BS</div>
    <div class="pin-sub">Admin Access</div>

    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>

    <div class="keypad">
      <button class="kbtn" onclick="pk('1')">1</button>
      <button class="kbtn" onclick="pk('2')">2</button>
      <button class="kbtn" onclick="pk('3')">3</button>
      <button class="kbtn" onclick="pk('4')">4</button>
      <button class="kbtn" onclick="pk('5')">5</button>
      <button class="kbtn" onclick="pk('6')">6</button>
      <button class="kbtn" onclick="pk('7')">7</button>
      <button class="kbtn" onclick="pk('8')">8</button>
      <button class="kbtn" onclick="pk('9')">9</button>
      <button class="kbtn empty" disabled></button>
      <button class="kbtn" onclick="pk('0')">0</button>
      <button class="kbtn del" onclick="dk()">⌫</button>
    </div>

    <div class="pin-msg" id="msg">Enter your 6-digit PIN</div>
    <div class="tries">
      <div class="try-dot" id="t0"></div>
      <div class="try-dot" id="t1"></div>
      <div class="try-dot" id="t2"></div>
    </div>
  </div>
</div>

<script type="module">
import { getPin } from './js/firebase.js';

// Already logged in?
if(localStorage.getItem('jbs_admin') || sessionStorage.getItem('jbs_admin')) {
  location.href = 'dashboard.html';
}

let cur = '';
let fails = parseInt(localStorage.getItem('jbs_f') || '0');
let lk = false;
let CORRECT_PIN = '123456'; // Default — loads from Firebase

// Load PIN from Firebase
(async () => {
  try {
    document.getElementById('loading').classList.add('show');
    CORRECT_PIN = await getPin();
    document.getElementById('loading').classList.remove('show');
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    console.log('Using default PIN');
  }
  checkLock();
  updateTries();
})();

function checkLock() {
  const lu = localStorage.getItem('jbs_lu');
  if(lu && Date.now() < +lu) {
    lk = true;
    startLockTimer(Math.ceil((+lu - Date.now()) / 1000));
  }
}

window.pk = function(n) {
  if(lk || cur.length >= 6) return;
  cur += n; draw();
  if(cur.length === 6) setTimeout(check, 150);
};

window.dk = function() {
  if(lk) return;
  cur = cur.slice(0, -1); draw();
  setMsg('Enter your 6-digit PIN', '');
};

function draw() {
  for(let i = 0; i < 6; i++) {
    const d = document.getElementById('d' + i);
    d.className = 'pin-dot' + (i < cur.length ? ' filled' : '');
  }
}

function setDots(cls) {
  for(let i = 0; i < 6; i++) document.getElementById('d' + i).className = 'pin-dot ' + cls;
}

function setMsg(txt, cls) {
  const el = document.getElementById('msg');
  el.className = 'pin-msg ' + (cls || '');
  el.textContent = txt;
}

function check() {
  if(cur === CORRECT_PIN) {
    setDots('ok');
    setMsg('✅ Access Granted!', 'ok');
    localStorage.setItem('jbs_admin', 'true');
    localStorage.removeItem('jbs_f');
    localStorage.removeItem('jbs_lu');
    setTimeout(() => location.href = 'dashboard.html', 600);
  } else {
    setDots('error');
    fails++; localStorage.setItem('jbs_f', fails); updateTries();
    if(fails >= 3) {
      const lu = Date.now() + 5 * 60 * 1000;
      localStorage.setItem('jbs_lu', lu);
      lk = true; startLockTimer(300);
    } else {
      setMsg('⚠️ Wrong PIN! ' + (3 - fails) + ' attempt' + (3 - fails === 1 ? '' : 's') + ' left', 'err');
    }
    setTimeout(() => { cur = ''; draw(); }, 600);
  }
}

function startLockTimer(secs) {
  let s = secs;
  setMsg('🔒 Locked! Try again in ' + s + 's', 'lock');
  const t = setInterval(() => {
    s--;
    if(s <= 0) {
      clearInterval(t); lk = false; fails = 0;
      localStorage.removeItem('jbs_f'); localStorage.removeItem('jbs_lu');
      setMsg('Enter your 6-digit PIN', ''); resetTries();
    } else {
      setMsg('🔒 Locked! Try again in ' + s + 's', 'lock');
    }
  }, 1000);
}

function updateTries() {
  for(let i = 0; i < 3; i++) document.getElementById('t' + i).className = 'try-dot' + (i < fails ? ' used' : '');
}
function resetTries() {
  for(let i = 0; i < 3; i++) document.getElementById('t' + i).className = 'try-dot';
}

// Keyboard
document.addEventListener('keydown', e => {
  if(e.key >= '0' && e.key <= '9') window.pk(e.key);
  if(e.key === 'Backspace') window.dk();
});
</script>
</body>
</html>
