<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — Jatin Brand Studio</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo"><span>J</span>BS</div>
    <div class="login-sub">Admin Panel</div>
    <div class="login-error" id="login-error"></div>
    <form class="login-form" id="login-form">
      <div class="l-group"><label>Email Address</label><input type="email" id="email" placeholder="admin@jatinbrandstudio.com" required></div>
      <div class="l-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" required></div>
      <label class="login-remember"><input type="checkbox" id="remember"> Remember me for 7 days</label>
      <button type="submit" class="login-btn" id="login-btn">Login to Admin →</button>
      <div class="login-forgot" onclick="alert('Contact: +91 92569 90806')">Forgot Password?</div>
    </form>
  </div>
</div>
<script src="js/auth.js"></script>
</body></html>
