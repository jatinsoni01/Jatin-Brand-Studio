<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfolio — JBS Admin</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
<div class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-text"><span>J</span>BS</div><div class="sidebar-logo-sub">Admin Panel</div></div>
  <div class="sidebar-admin"><div class="sidebar-avatar">👤</div><div><div class="sidebar-name">Jatin</div><div class="sidebar-role">Administrator</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="orders.html"><span class="nav-icon">📦</span> Orders</a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">📩</span> Messages</a>
    <div class="nav-section-title">Content</div>
    <a class="nav-item active" href="portfolio.html"><span class="nav-icon">🖼️</span> Portfolio</a>
    <a class="nav-item" href="services.html"><span class="nav-icon">🎨</span> Services</a>
    <a class="nav-item" href="pricing.html"><span class="nav-icon">💰</span> Pricing</a>
    <a class="nav-item" href="reviews.html"><span class="nav-icon">⭐</span> Reviews</a>
    <a class="nav-item" href="blog.html"><span class="nav-icon">📝</span> Blog</a>
    <div class="nav-section-title">Settings</div>
    <a class="nav-item" href="about.html"><span class="nav-icon">👤</span> About</a>
    <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
  </nav>
  <div class="sidebar-footer"><div class="logout-btn" onclick="doLogout()">🚪 Logout</div></div>
</div>
<div class="main-content">
  <div class="topbar">
    <div class="topbar-left"><button class="ham-mob" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button><div class="page-title-top">Portfolio</div></div>
    <div class="topbar-right"><button class="btn btn-orange" onclick="openAdd()">+ Add Project</button></div>
  </div>
  <div class="page-content">
    <div class="card">
      <div class="card-title">All <span>Projects</span> <span id="port-count" style="background:var(--orange);color:#fff;padding:2px 10px;font-size:.8rem;font-family:'Barlow Condensed',sans-serif">0</span></div>
      <div class="filter-bar" style="margin-bottom:20px">
        <div class="filter-tab-group">
          <button class="filter-tab active" onclick="setcat('all',this)">All</button>
          <button class="filter-tab" onclick="setcat('website',this)">Websites</button>
          <button class="filter-tab" onclick="setcat('logo',this)">Logos</button>
          <button class="filter-tab" onclick="setcat('banner',this)">Banners</button>
          <button class="filter-tab" onclick="setcat('social',this)">Social</button>
          <button class="filter-tab" onclick="setcat('print',this)">Print</button>
        </div>
      </div>
      <div class="port-admin-grid" id="port-grid">
        <div style="grid-column:1/-1;text-align:center;color:#666;padding:40px">Loading portfolio...</div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="port-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="modal-title">Add <span>Project</span></div><button class="modal-close" onclick="closeM()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-grid">
        <div class="form-group"><label>Project Title *</label><input id="p-title" placeholder="e.g. Restaurant Website"></div>
        <div class="form-group"><label>Category *</label>
          <select id="p-cat"><option value="">Select</option><option value="website">Website</option><option value="logo">Logo</option><option value="banner">Banner</option><option value="social">Social Media</option><option value="print">Print</option></select>
        </div>
        <div class="form-group"><label>Client Name</label><input id="p-client" placeholder="Optional"></div>
        <div class="form-group"><label>Featured on Homepage</label>
          <label class="toggle-wrap"><span class="toggle"><input type="checkbox" id="p-featured"><span class="toggle-slider"></span></span> Yes</label>
        </div>
        <div class="form-group form-full"><label>Description</label><textarea id="p-desc" placeholder="Brief description..."></textarea></div>
        <div class="form-group form-full"><label>Upload Image (Cloudinary)</label>
          <input type="file" id="p-img" accept="image/*" style="background:var(--dark3);border:1px solid rgba(255,255,255,.08);color:#999;padding:10px;font-size:.85rem;outline:none;width:100%">
          <div id="img-preview" style="margin-top:10px"></div>
          <div id="upload-status" style="font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:#666;margin-top:6px"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeM()">Cancel</button>
      <button class="btn btn-orange" onclick="saveProject()" id="save-btn">Save Project</button>
    </div>
  </div>
</div>

<script type="module">
import { listenPortfolio, addPortfolio, updatePortfolioItem, deletePortfolioItem, uploadImage } from './js/firebase.js';

if(!localStorage.getItem('jbs_admin') && !sessionStorage.getItem('jbs_admin')) location.href = 'index.html';
window.doLogout = () => { if(confirm('Logout?')) { localStorage.removeItem('jbs_admin'); location.href = 'index.html'; } };

let allItems = []; let activeCat = 'all';
const catIcons = { website:'🌐', logo:'🎨', banner:'🖼️', social:'📱', print:'🖨️' };

listenPortfolio((items) => {
  allItems = items;
  document.getElementById('port-count').textContent = items.length;
  renderGrid();
});

window.setcat = (c, el) => {
  activeCat = c;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
};

function renderGrid() {
  const filtered = activeCat === 'all' ? allItems : allItems.filter(i => i.category === activeCat);
  const grid = document.getElementById('port-grid');
  if(filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#666;padding:40px">${allItems.length===0?'No projects yet — add your first project! 🎨':'No items in this category'}</div>`;
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <div class="port-admin-card" data-cat="${item.category||''}">
      <div class="port-admin-thumb">
        ${item.imageUrl ? `<img src="${item.imageUrl}" style="width:100%;height:100%;object-fit:cover">` : (catIcons[item.category]||'🖼️')}
      </div>
      <div class="port-admin-body">
        <div class="port-admin-name">${item.title||'Untitled'}</div>
        <div class="port-admin-cat">${item.category||'—'} ${item.featured?'⭐':''}</div>
        <div class="port-admin-actions">
          <button class="act-btn edit" onclick="editProject('${item.id}')">✏️</button>
          <button class="act-btn del" onclick="delProject('${item.id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.openAdd = () => {
  document.getElementById('modal-title').innerHTML = 'Add <span>Project</span>';
  document.getElementById('edit-id').value = '';
  ['p-title','p-client','p-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-cat').value = '';
  document.getElementById('p-featured').checked = false;
  document.getElementById('img-preview').innerHTML = '';
  document.getElementById('upload-status').textContent = '';
  document.getElementById('port-modal').classList.add('open');
};

window.editProject = (id) => {
  const item = allItems.find(x => x.id === id);
  if(!item) return;
  document.getElementById('modal-title').innerHTML = 'Edit <span>Project</span>';
  document.getElementById('edit-id').value = id;
  document.getElementById('p-title').value = item.title||'';
  document.getElementById('p-cat').value = item.category||'';
  document.getElementById('p-client').value = item.client||'';
  document.getElementById('p-desc').value = item.description||'';
  document.getElementById('p-featured').checked = !!item.featured;
  document.getElementById('img-preview').innerHTML = item.imageUrl ? `<img src="${item.imageUrl}" style="max-width:100%;max-height:120px;object-fit:cover">` : '';
  document.getElementById('port-modal').classList.add('open');
};

window.saveProject = async () => {
  const title = document.getElementById('p-title').value.trim();
  const cat = document.getElementById('p-cat').value;
  if(!title || !cat) { alert('Title and Category required!'); return; }

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;

  let imageUrl = '';
  const imgFile = document.getElementById('p-img').files[0];
  if(imgFile) {
    document.getElementById('upload-status').textContent = '⬆️ Uploading image...';
    try { imageUrl = await uploadImage(imgFile); document.getElementById('upload-status').textContent = '✅ Uploaded!'; }
    catch(e) { document.getElementById('upload-status').textContent = '❌ Upload failed'; }
  }

  const data = {
    title, category: cat,
    client: document.getElementById('p-client').value,
    description: document.getElementById('p-desc').value,
    featured: document.getElementById('p-featured').checked,
    ...(imageUrl && { imageUrl })
  };

  const editId = document.getElementById('edit-id').value;
  if(editId) { await updatePortfolioItem(editId, data); }
  else { await addPortfolio(data); }

  btn.textContent = 'Save Project'; btn.disabled = false;
  closeM(); toast('Project saved! ✅');
};

window.delProject = async (id) => {
  if(!confirm('Delete this project?')) return;
  await deletePortfolioItem(id); toast('Deleted! 🗑️');
};

window.closeM = () => document.getElementById('port-modal').classList.remove('open');

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 24px;font-family:"Barlow Condensed",sans-serif;font-size:.9rem;font-weight:700;z-index:9999;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)';
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
