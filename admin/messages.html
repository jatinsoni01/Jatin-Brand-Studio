<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Messages — JBS Admin</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
<div class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-text"><span>J</span>BS</div><div class="sidebar-logo-sub">Admin Panel</div></div>
  <div class="sidebar-admin"><div class="sidebar-avatar">👤</div><div><div class="sidebar-name">Jatin</div><div class="sidebar-role">Administrator</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="orders.html"><span class="nav-icon">📦</span> Orders</a>
    <a class="nav-item active" href="messages.html"><span class="nav-icon">📩</span> Messages</a>
    <div class="nav-section-title">Content</div>
    <a class="nav-item" href="portfolio.html"><span class="nav-icon">🖼️</span> Portfolio</a>
    <a class="nav-item" href="services.html"><span class="nav-icon">🎨</span> Services</a>
    <a class="nav-item" href="pricing.html"><span class="nav-icon">💰</span> Pricing</a>
    <a class="nav-item" href="reviews.html"><span class="nav-icon">⭐</span> Reviews</a>
    <a class="nav-item" href="blog.html"><span class="nav-icon">📝</span> Blog</a>
    <div class="nav-section-title">Settings</div>
    <a class="nav-item" href="about.html"><span class="nav-icon">👤</span> About</a>
    <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
  </nav>
  <div class="sidebar-footer"><div class="logout-btn" onclick="doLogout()">🚪 Logout</div></div>
</div>
<div class="main-content">
  <div class="topbar">
    <div class="topbar-left"><button class="ham-mob" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button><div class="page-title-top">Messages</div></div>
    <div class="topbar-right"><span style="font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:#22c55e">🟢 Live</span></div>
  </div>
  <div class="page-content">
    <div class="card" style="padding:0;overflow:hidden">
      <div class="msg-layout">
        <div class="msg-list">
          <div class="msg-list-header">
            📩 Messages <span id="unread-count" style="background:var(--orange);color:#fff;padding:1px 8px;font-size:.75rem;border-radius:10px;font-family:'Barlow Condensed',sans-serif">0</span>
          </div>
          <div style="padding:10px"><input type="text" id="msg-search" oninput="filterMsgs()" style="width:100%;background:var(--dark3);border:1px solid rgba(255,255,255,.08);color:#fff;padding:8px 12px;font-size:.85rem;outline:none" placeholder="🔍 Search..."></div>
          <div id="msg-list-items">
            <div style="text-align:center;color:#666;padding:30px">Loading messages...</div>
          </div>
        </div>
        <div class="msg-detail" id="msg-detail">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#555;gap:16px">
            <div style="font-size:4rem">📩</div>
            <div style="font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;font-size:.9rem">SELECT A MESSAGE</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script type="module">
import { listenMessages, markMessageRead, deleteMessage } from './js/firebase.js';

if(!localStorage.getItem('jbs_admin') && !sessionStorage.getItem('jbs_admin')) location.href = 'index.html';
window.doLogout = () => { if(confirm('Logout?')) { localStorage.removeItem('jbs_admin'); location.href = 'index.html'; } };

let allMsgs = [];
let activeId = null;

listenMessages((msgs) => {
  allMsgs = msgs;
  const unread = msgs.filter(m => !m.read).length;
  document.getElementById('unread-count').textContent = unread;
  renderList();
  if(activeId) showDetail(activeId);
});

window.filterMsgs = () => renderList();

function renderList() {
  const search = document.getElementById('msg-search').value.toLowerCase();
  const filtered = allMsgs.filter(m => !search || (m.name||'').toLowerCase().includes(search) || (m.service||'').toLowerCase().includes(search));
  const el = document.getElementById('msg-list-items');

  if(filtered.length === 0) {
    el.innerHTML = `<div style="text-align:center;color:#666;padding:30px">${allMsgs.length === 0 ? 'No messages yet 📬' : 'No results'}</div>`;
    return;
  }

  el.innerHTML = filtered.map(m => `
    <div class="msg-item ${!m.read?'unread':''} ${m.id===activeId?'active':''}" onclick="selectMsg('${m.id}')">
      <div class="msg-item-name">${m.name||'Unknown'}</div>
      <div class="msg-item-preview">${m.service||''} — ${(m.message||'').slice(0,50)}...</div>
      <div class="msg-item-time">⏰ ${m.createdAt ? new Date(m.createdAt).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'}</div>
    </div>
  `).join('');
}

window.selectMsg = async (id) => {
  activeId = id;
  await markMessageRead(id);
  renderList();
  showDetail(id);
};

function showDetail(id) {
  const m = allMsgs.find(x => x.id === id);
  if(!m) return;
  document.getElementById('msg-detail').innerHTML = `
    <div class="msg-detail-header">
      <div class="msg-detail-name">${m.name||'Unknown'}</div>
      <div class="msg-detail-service">🎨 ${m.service||'Inquiry'}</div>
      <div class="msg-detail-actions">
        <button class="btn btn-orange btn-sm" onclick="window.open('https://wa.me/${(m.phone||'919256990806').replace(/\D/g,'')}?text=Hi ${encodeURIComponent(m.name||'')}! I am Jatin from Jatin Brand Studio.','_blank')">💬 WhatsApp</button>
        <button class="btn btn-danger btn-sm" onclick="delMsg('${m.id}')">🗑️ Delete</button>
        <span class="badge ${m.read?'badge-done':'badge-new'}">${m.read?'✅ Read':'🔵 Unread'}</span>
      </div>
    </div>
    <div class="msg-meta-grid">
      <div class="msg-meta-item"><div class="msg-meta-label">Phone</div><div class="msg-meta-val">${m.phone||'—'}</div></div>
      <div class="msg-meta-item"><div class="msg-meta-label">Email</div><div class="msg-meta-val">${m.email||'—'}</div></div>
      <div class="msg-meta-item"><div class="msg-meta-label">Service</div><div class="msg-meta-val">${m.service||'—'}</div></div>
      <div class="msg-meta-item"><div class="msg-meta-label">Budget</div><div class="msg-meta-val" style="color:var(--orange)">${m.budget||'—'}</div></div>
      <div class="msg-meta-item"><div class="msg-meta-label">Date</div><div class="msg-meta-val">${m.createdAt?new Date(m.createdAt).toLocaleString('en-IN'):'—'}</div></div>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:#999;margin-bottom:10px">Message</div>
    <div class="msg-text-box">${m.message||'No message'}</div>
  `;
}

window.delMsg = async (id) => {
  if(!confirm('Delete this message?')) return;
  if(id === activeId) { activeId = null; document.getElementById('msg-detail').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#555;gap:16px"><div style="font-size:4rem">📩</div></div>'; }
  await deleteMessage(id);
};
</script>
</body>
</html>
