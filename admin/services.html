<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Services — JBS Admin</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
<div class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-text"><span>J</span>BS</div><div class="sidebar-logo-sub">Admin Panel</div></div>
  <div class="sidebar-admin"><div class="sidebar-avatar">👤</div><div><div class="sidebar-name">Jatin</div><div class="sidebar-role">Administrator</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="orders.html"><span class="nav-icon">📦</span> Orders</a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">📩</span> Messages</a>
    <div class="nav-section-title">Content</div>
    <a class="nav-item" href="portfolio.html"><span class="nav-icon">🖼️</span> Portfolio</a>
    <a class="nav-item active" href="services.html"><span class="nav-icon">🎨</span> Services</a>
    <a class="nav-item" href="pricing.html"><span class="nav-icon">💰</span> Pricing</a>
    <a class="nav-item" href="reviews.html"><span class="nav-icon">⭐</span> Reviews</a>
    <a class="nav-item" href="blog.html"><span class="nav-icon">📝</span> Blog</a>
    <div class="nav-section-title">Settings</div>
    <a class="nav-item" href="about.html"><span class="nav-icon">👤</span> About</a>
    <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
  </nav>
  <div class="sidebar-footer"><div class="logout-btn" onclick="doLogout()">🚪 Logout</div></div>
</div>
<div class="main-content">
  <div class="topbar">
    <div class="topbar-left"><button class="ham-mob" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button><div class="page-title-top">Services</div></div>
    <div class="topbar-right">
      <button class="btn btn-orange" onclick="openAdd()">+ Add Service</button>
    </div>
  </div>
  <div class="page-content">

    <!-- Loading -->
    <div id="srv-loading" style="text-align:center;padding:60px;color:#666">
      <div style="font-size:3rem;margin-bottom:16px">🎨</div>
      <div style="font-family:'Barlow Condensed',sans-serif;letter-spacing:2px">Loading services...</div>
    </div>

    <div class="grid-2" id="srv-grid" style="display:none"></div>

  </div>
</div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="srv-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="srv-modal-title">Add <span>Service</span></div>
      <button class="modal-close" onclick="closeM()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="srv-edit-id">
      <div class="form-grid">
        <div class="form-group"><label>Service Name *</label><input id="s-name" placeholder="e.g. Logo Design"></div>
        <div class="form-group"><label>Icon (Emoji)</label><input id="s-icon" placeholder="e.g. 🎨" maxlength="4"></div>
        <div class="form-group"><label>Starting Price ₹ *</label><input id="s-price" type="number" placeholder="499"></div>
        <div class="form-group"><label>Status</label>
          <select id="s-status"><option value="active">Active</option><option value="hidden">Hidden</option></select>
        </div>
        <div class="form-group form-full"><label>Short Description *</label><input id="s-desc" placeholder="Brief description..."></div>
        <div class="form-group form-full">
          <label>Features List</label>
          <div id="s-feats-list" style="margin-bottom:10px"></div>
          <div style="display:flex;gap:8px">
            <input id="s-feat-inp" placeholder="Add a feature..." style="flex:1;background:var(--dark3);border:1px solid rgba(255,255,255,.08);color:#fff;padding:8px 12px;font-size:.85rem;outline:none" onkeydown="if(event.key==='Enter'){addFeat();event.preventDefault()}">
            <button class="btn btn-ghost btn-sm" onclick="addFeat()">+ Add</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeM()">Cancel</button>
      <button class="btn btn-orange" onclick="saveSrv()" id="srv-save-btn">Save Service</button>
    </div>
  </div>
</div>

<script type="module">
import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";

const app = initializeApp({
  apiKey: "AIzaSyAFVqoM9SDu_YkjWLo6O1MBM0pIv-GTrp0",
  authDomain: "jatinbrandstudio-fecc8.firebaseapp.com",
  projectId: "jatinbrandstudio-fecc8",
  storageBucket: "jatinbrandstudio-fecc8.firebasestorage.app",
  messagingSenderId: "895387928657",
  appId: "1:895387928657:web:9454f887b2e2259c379070"
});
const db = getFirestore(app);

if(!localStorage.getItem('jbs_admin')&&!sessionStorage.getItem('jbs_admin')) location.href='index.html';
window.doLogout = () => { if(confirm('Logout?')){ localStorage.removeItem('jbs_admin'); location.href='index.html'; } };

let allSrvs = [];
let features = [];

// Default services if Firebase empty
const defaultServices = [
  { name:'Website Design', icon:'🌐', price:2999, desc:'Modern, responsive & fast websites that convert visitors into clients.', features:['Landing Pages','Business Websites','E-commerce Sites','Portfolio Websites'], status:'active' },
  { name:'Logo Design', icon:'🎨', price:499, desc:'Memorable logos that define your brand identity.', features:['Wordmark Logo','Emblem Logo','Mascot Logo','Full Brand Kit'], status:'active' },
  { name:'Brand Identity', icon:'🏷️', price:1999, desc:'Complete branding from scratch.', features:['Logo + Color Palette','Typography','Brand Guidelines','Stationery Design'], status:'active' },
  { name:'Social Media Design', icon:'📱', price:999, desc:'Scroll-stopping social content that grows your audience.', features:['Post Templates','Story Templates','Reel Thumbnails','Profile Branding'], status:'active' },
  { name:'Print Design', icon:'🖨️', price:299, desc:'Professional print materials.', features:['Business Cards','Flyers & Posters','Brochures','Banners'], status:'active' },
  { name:'UI/UX Design', icon:'📊', price:3999, desc:'User-friendly digital experiences.', features:['App UI Design','Website Wireframes','Interactive Prototype','User Flow'], status:'active' }
];

// Live listener
onSnapshot(collection(db, 'services'), async (snap) => {
  document.getElementById('srv-loading').style.display = 'none';
  document.getElementById('srv-grid').style.display = 'grid';

  if (snap.empty) {
    // First time — seed default services
    for (const s of defaultServices) {
      await addDoc(collection(db, 'services'), { ...s, createdAt: new Date().toISOString() });
    }
    return;
  }

  allSrvs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderServices();
});

function renderServices() {
  const grid = document.getElementById('srv-grid');
  grid.innerHTML = allSrvs.map(s => `
    <div class="card">
      <div class="card-title">
        ${s.icon||'🎨'} ${s.name||'Service'}
        <div style="display:flex;align-items:center;gap:10px">
          <label class="toggle-wrap" style="font-size:.8rem">
            <span class="toggle"><input type="checkbox" ${s.status!=='hidden'?'checked':''} onchange="toggleStatus('${s.id}',this.checked)"><span class="toggle-slider"></span></span>
            ${s.status!=='hidden'?'Active':'Hidden'}
          </label>
          <button class="act-btn edit" onclick="editSrv('${s.id}')">✏️</button>
          <button class="act-btn del" onclick="delSrv('${s.id}')">🗑️</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Name</label><input value="${s.name||''}" onchange="quickSave('${s.id}','name',this.value)"></div>
        <div class="form-group"><label>Price ₹</label><input type="number" value="${s.price||''}" onchange="quickSave('${s.id}','price',+this.value)"></div>
        <div class="form-group form-full"><label>Description</label><input value="${s.desc||''}" onchange="quickSave('${s.id}','desc',this.value)"></div>
      </div>
      <div style="margin-top:12px">
        <label style="font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:#999;display:block;margin-bottom:8px">Features</label>
        <ul id="feat-${s.id}" style="display:flex;flex-direction:column;gap:4px">
          ${(s.features||[]).map((f,i) => `
            <li style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem;color:#ccc">
              <span style="color:var(--orange)">✓</span> ${f}
              <button onclick="removeFeatDirect('${s.id}',${i})" style="margin-left:auto;background:none;border:none;color:#666;cursor:pointer;font-size:.9rem">✕</button>
            </li>`).join('')}
        </ul>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input id="feat-inp-${s.id}" placeholder="Add feature..." style="flex:1;background:var(--dark3);border:1px solid rgba(255,255,255,.08);color:#fff;padding:7px 10px;font-size:.82rem;outline:none" onkeydown="if(event.key==='Enter'){addFeatDirect('${s.id}');event.preventDefault()}">
          <button class="btn btn-ghost btn-sm" onclick="addFeatDirect('${s.id}')">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.quickSave = async (id, field, val) => {
  await updateDoc(doc(db, 'services', id), { [field]: val });
  toast('Saved! ✅');
};

window.toggleStatus = async (id, active) => {
  await updateDoc(doc(db, 'services', id), { status: active ? 'active' : 'hidden' });
  toast(active ? 'Service activated! ✅' : 'Service hidden! 👁️');
};

window.addFeatDirect = async (id) => {
  const inp = document.getElementById('feat-inp-' + id);
  if (!inp?.value.trim()) return;
  const srv = allSrvs.find(s => s.id === id);
  const feats = [...(srv?.features || []), inp.value.trim()];
  await updateDoc(doc(db, 'services', id), { features: feats });
  inp.value = ''; toast('Feature added! ✅');
};

window.removeFeatDirect = async (id, idx) => {
  const srv = allSrvs.find(s => s.id === id);
  const feats = (srv?.features || []).filter((_, i) => i !== idx);
  await updateDoc(doc(db, 'services', id), { features: feats });
  toast('Feature removed!');
};

window.openAdd = () => {
  document.getElementById('srv-modal-title').innerHTML = 'Add <span>Service</span>';
  document.getElementById('srv-edit-id').value = '';
  ['s-name','s-icon','s-price','s-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('s-status').value = 'active';
  features = []; renderFeats();
  document.getElementById('srv-modal').classList.add('open');
};

window.editSrv = (id) => {
  const s = allSrvs.find(x => x.id === id);
  if (!s) return;
  document.getElementById('srv-modal-title').innerHTML = 'Edit <span>Service</span>';
  document.getElementById('srv-edit-id').value = id;
  document.getElementById('s-name').value = s.name || '';
  document.getElementById('s-icon').value = s.icon || '';
  document.getElementById('s-price').value = s.price || '';
  document.getElementById('s-desc').value = s.desc || '';
  document.getElementById('s-status').value = s.status || 'active';
  features = [...(s.features || [])]; renderFeats();
  document.getElementById('srv-modal').classList.add('open');
};

window.addFeat = () => {
  const inp = document.getElementById('s-feat-inp');
  if (!inp.value.trim()) return;
  features.push(inp.value.trim()); inp.value = ''; renderFeats();
};

function renderFeats() {
  document.getElementById('s-feats-list').innerHTML = features.map((f, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem;color:#ccc">
      <span style="color:var(--orange)">✓</span> ${f}
      <button onclick="features.splice(${i},1);renderFeats()" style="margin-left:auto;background:none;border:none;color:#666;cursor:pointer">✕</button>
    </div>`).join('');
}
window.renderFeats = renderFeats;

window.saveSrv = async () => {
  const name = document.getElementById('s-name').value.trim();
  if (!name) { alert('Service name required!'); return; }
  const btn = document.getElementById('srv-save-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;

  const data = {
    name, icon: document.getElementById('s-icon').value,
    price: +document.getElementById('s-price').value,
    desc: document.getElementById('s-desc').value,
    status: document.getElementById('s-status').value,
    features
  };

  const editId = document.getElementById('srv-edit-id').value;
  if (editId) await updateDoc(doc(db, 'services', editId), data);
  else await addDoc(collection(db, 'services'), { ...data, createdAt: new Date().toISOString() });

  btn.textContent = 'Save Service'; btn.disabled = false;
  closeM(); toast('Service saved! ✅');
};

window.delSrv = async (id) => {
  if (!confirm('Delete this service?')) return;
  await deleteDoc(doc(db, 'services', id)); toast('Deleted! 🗑️');
};

window.closeM = () => document.getElementById('srv-modal').classList.remove('open');

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 24px;font-family:"Barlow Condensed",sans-serif;font-size:.9rem;font-weight:700;z-index:9999;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)';
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body></html>
