<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>About Editor — JBS Admin</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
<div class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-text"><span>J</span>BS</div><div class="sidebar-logo-sub">Admin Panel</div></div>
  <div class="sidebar-admin"><div class="sidebar-avatar">👤</div><div><div class="sidebar-name">Jatin</div><div class="sidebar-role">Administrator</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="orders.html"><span class="nav-icon">📦</span> Orders</a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">📩</span> Messages</a>
    <div class="nav-section-title">Content</div>
    <a class="nav-item" href="portfolio.html"><span class="nav-icon">🖼️</span> Portfolio</a>
    <a class="nav-item" href="services.html"><span class="nav-icon">🎨</span> Services</a>
    <a class="nav-item" href="pricing.html"><span class="nav-icon">💰</span> Pricing</a>
    <a class="nav-item" href="reviews.html"><span class="nav-icon">⭐</span> Reviews</a>
    <a class="nav-item" href="blog.html"><span class="nav-icon">📝</span> Blog</a>
    <div class="nav-section-title">Settings</div>
    <a class="nav-item active" href="about.html"><span class="nav-icon">👤</span> About</a>
    <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
  </nav>
  <div class="sidebar-footer"><div class="logout-btn" onclick="doLogout()">🚪 Logout</div></div>
</div>
<div class="main-content">
  <div class="topbar">
    <div class="topbar-left"><button class="ham-mob" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button><div class="page-title-top">About Editor</div></div>
    <div class="topbar-right"><button class="btn btn-orange" onclick="saveAll()" id="save-all-btn">💾 Save All to Firebase</button></div>
  </div>
  <div class="page-content">

    <div class="grid-2">

      <!-- PHOTO + NAME -->
      <div class="card">
        <div class="card-title">Profile <span>Photo</span></div>
        <div style="text-align:center;margin-bottom:20px">
          <div id="photo-preview" style="width:120px;height:120px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:3rem;margin:0 auto 16px;border:3px solid var(--orange);overflow:hidden">🎨</div>
          <button class="btn btn-outline-o btn-sm" onclick="document.getElementById('photo-upload').click()">📸 Upload Photo</button>
          <input type="file" id="photo-upload" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
          <input type="hidden" id="photo-url">
          <div id="photo-status" style="font-size:.8rem;color:#666;margin-top:8px"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Your Name</label><input id="a-name" value="Jatin"></div>
          <div class="form-group"><label>Your Title/Role</label><input id="a-title" value="Designer & Founder"></div>
        </div>
      </div>

      <!-- ACHIEVEMENT NUMBERS -->
      <div class="card">
        <div class="card-title">Achievement <span>Numbers</span></div>
        <div style="background:rgba(255,102,0,.08);border:1px solid rgba(255,102,0,.2);padding:12px;margin-bottom:20px;font-size:.85rem;color:#aaa">
          ✏️ These numbers show on the About page automatically
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Projects Number</label><input id="a-projects" type="number" value="50"></div>
          <div class="form-group"><label>Projects Label</label><input id="a-projects-lbl" value="Projects Completed"></div>
          <div class="form-group"><label>Clients Number</label><input id="a-clients" type="number" value="30"></div>
          <div class="form-group"><label>Clients Label</label><input id="a-clients-lbl" value="Happy Clients"></div>
          <div class="form-group"><label>Years Number</label><input id="a-years" type="number" value="3"></div>
          <div class="form-group"><label>Years Label</label><input id="a-years-lbl" value="Years Experience"></div>
        </div>
      </div>

    </div>

    <!-- BIO -->
    <div class="card">
      <div class="card-title">Your <span>Story</span></div>
      <div class="form-grid">
        <div class="form-group form-full">
          <label>Short Bio (shown on homepage)</label>
          <textarea id="a-short" style="height:80px">We are a passionate design studio based in Ludhiana, Punjab, dedicated to crafting visual identities that speak volumes.</textarea>
        </div>
        <div class="form-group form-full">
          <label>Full Bio (shown on about page)</label>
          <textarea id="a-long" style="height:140px">Jatin Brand Studio was born out of a simple passion — to help businesses look as great as they truly are. Founded in Ludhiana, Punjab, we started with a dream to bring world-class design to local businesses. Over the years, we have worked with startups, small businesses, and entrepreneurs across India, helping them build powerful visual identities that drive real, measurable growth.</textarea>
        </div>
      </div>
    </div>

    <!-- SKILLS -->
    <div class="card">
      <div class="card-title">Skills / <span>Tags</span></div>
      <div id="skills-list" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <!-- loaded from Firebase -->
      </div>
      <div style="display:flex;gap:10px">
        <input id="skill-inp" placeholder="Add a skill..." style="flex:1;background:var(--dark3);border:1px solid rgba(255,255,255,.08);color:#fff;padding:10px 14px;font-size:.9rem;outline:none" onkeydown="if(event.key==='Enter'){addSkill();event.preventDefault()}">
        <button class="btn btn-orange btn-sm" onclick="addSkill()">+ Add Skill</button>
      </div>
    </div>

  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const CLOUDINARY = { cloudName: "dxi4bsikl", uploadPreset: "JBS_default" };

const app = initializeApp({
  apiKey: "AIzaSyAFVqoM9SDu_YkjWLo6O1MBM0pIv-GTrp0",
  authDomain: "jatinbrandstudio-fecc8.firebaseapp.com",
  projectId: "jatinbrandstudio-fecc8",
  storageBucket: "jatinbrandstudio-fecc8.firebasestorage.app",
  messagingSenderId: "895387928657",
  appId: "1:895387928657:web:9454f887b2e2259c379070"
});
const db = getFirestore(app);

if(!localStorage.getItem('jbs_admin')&&!sessionStorage.getItem('jbs_admin')) location.href='index.html';
window.doLogout = () => { if(confirm('Logout?')){ localStorage.removeItem('jbs_admin'); location.href='index.html'; } };

let skills = ['Photoshop','Illustrator','Figma','WordPress','HTML/CSS'];

// Load data from Firebase
(async () => {
  try {
    const snap = await getDoc(doc(db, 'settings', 'main'));
    if (!snap.exists()) { renderSkills(); return; }
    const d = snap.data();

    if (d.aboutName) document.getElementById('a-name').value = d.aboutName;
    if (d.aboutTitle) document.getElementById('a-title').value = d.aboutTitle;
    if (d.aboutShort) document.getElementById('a-short').value = d.aboutShort;
    if (d.aboutLong) document.getElementById('a-long').value = d.aboutLong;
    if (d.statProjects) document.getElementById('a-projects').value = d.statProjects;
    if (d.statClients) document.getElementById('a-clients').value = d.statClients;
    if (d.statYears) document.getElementById('a-years').value = d.statYears;
    if (d.skills) skills = d.skills;
    if (d.photoUrl) {
      document.getElementById('photo-url').value = d.photoUrl;
      document.getElementById('photo-preview').innerHTML = `<img src="${d.photoUrl}" style="width:100%;height:100%;object-fit:cover">`;
    }
    renderSkills();
  } catch(e) { renderSkills(); console.log('Load error:', e); }
})();

function renderSkills() {
  document.getElementById('skills-list').innerHTML = skills.map((s, i) => `
    <span style="background:rgba(255,102,0,.15);color:var(--orange);padding:8px 16px;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:1.5px;display:flex;align-items:center;gap:8px">
      ${s}
      <button onclick="skills.splice(${i},1);renderSkills()" style="background:none;border:none;color:var(--orange);cursor:pointer;font-size:1rem">✕</button>
    </span>`).join('');
}
window.renderSkills = renderSkills;

window.addSkill = () => {
  const inp = document.getElementById('skill-inp');
  if (!inp.value.trim()) return;
  skills.push(inp.value.trim()); inp.value = ''; renderSkills();
};

window.uploadPhoto = async (input) => {
  const file = input.files[0]; if (!file) return;
  document.getElementById('photo-status').textContent = '⬆️ Uploading...';
  try {
    const fd = new FormData();
    fd.append('file', file); fd.append('upload_preset', CLOUDINARY.uploadPreset);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`, { method:'POST', body:fd });
    const data = await res.json();
    document.getElementById('photo-url').value = data.secure_url;
    document.getElementById('photo-preview').innerHTML = `<img src="${data.secure_url}" style="width:100%;height:100%;object-fit:cover">`;
    document.getElementById('photo-status').textContent = '✅ Uploaded!';
    toast('Photo uploaded! ✅');
  } catch(e) { document.getElementById('photo-status').textContent = '❌ Upload failed'; }
};

window.saveAll = async () => {
  const btn = document.getElementById('save-all-btn');
  btn.textContent = '⏳ Saving...'; btn.disabled = true;

  const data = {
    aboutName: document.getElementById('a-name').value,
    aboutTitle: document.getElementById('a-title').value,
    aboutShort: document.getElementById('a-short').value,
    aboutLong: document.getElementById('a-long').value,
    statProjects: +document.getElementById('a-projects').value,
    statClients: +document.getElementById('a-clients').value,
    statYears: +document.getElementById('a-years').value,
    skills,
    photoUrl: document.getElementById('photo-url').value || ''
  };

  try {
    await setDoc(doc(db, 'settings', 'main'), data, { merge: true });
    toast('All saved to Firebase! ✅ Website auto-updated!');
  } catch(e) { toast('Save failed! ❌', true); console.log(e); }

  btn.textContent = '💾 Save All to Firebase'; btn.disabled = false;
};

function toast(msg, err=false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${err?'#ef4444':'#22c55e'};color:#fff;padding:12px 24px;font-family:"Barlow Condensed",sans-serif;font-size:.9rem;font-weight:700;z-index:9999;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)`;
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body></html>
